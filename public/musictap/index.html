<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f6f1">
  <meta name="description" content="MusicTap is a mobile browser rhythm tap prototype for pasted music links and local audio.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <title>MusicTap</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f4f6f1;
      --ink: #15171a;
      --muted: #687078;
      --surface: #ffffff;
      --coral: #ff5a5f;
      --teal: #00a896;
      --yellow: #f5c446;
      --lime: #99db52;
      --shadow: 0 18px 45px rgba(15, 18, 22, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      user-select: none;
    }

    input {
      user-select: text;
    }

    .shell {
      width: min(100%, 520px);
      min-height: 100vh;
      min-height: 100svh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: calc(14px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: grid;
      grid-template-columns: 54px 1fr 46px;
      gap: 12px;
      align-items: center;
    }

    .art {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(245, 196, 70, 0.95), rgba(255, 90, 95, 0.92)),
        #15171a;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .art::before,
    .art::after {
      content: "";
      position: absolute;
      inset: 13px 18px;
      border: 4px solid rgba(21, 23, 26, 0.76);
      border-left: 0;
      border-radius: 0 18px 18px 0;
    }

    .art::after {
      inset: 20px 12px 12px 28px;
      border-color: rgba(255, 255, 255, 0.78);
    }

    .title-block {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.15;
      font-weight: 850;
    }

    .subline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      width: 46px;
      height: 46px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      display: grid;
      place-items: center;
      position: relative;
    }

    .icon-button span,
    .play-button span {
      display: block;
      width: 18px;
      height: 18px;
      position: relative;
    }

    .playlist-icon::before,
    .playlist-icon::after {
      content: "";
      position: absolute;
      left: 0;
      right: 6px;
      height: 3px;
      background: currentColor;
      border-radius: 3px;
    }

    .playlist-icon::before {
      top: 3px;
      box-shadow: 0 6px 0 currentColor;
    }

    .playlist-icon::after {
      width: 5px;
      height: 5px;
      left: 13px;
      top: 12px;
      border-radius: 50%;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #e7ece5;
      padding: 4px;
      border-radius: 8px;
      gap: 4px;
    }

    .segmented button {
      border: 0;
      min-height: 36px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
      cursor: pointer;
    }

    .segmented button.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.07);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      background: var(--surface);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.05);
      min-width: 0;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .stat-value {
      margin-top: 2px;
      font-size: 21px;
      line-height: 1.1;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arena {
      flex: 1;
      min-height: clamp(320px, 52svh, 470px);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        #15171a;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      touch-action: manipulation;
    }

    .lane-wrap {
      position: absolute;
      inset: 10px;
      display: grid;
      gap: 7px;
      z-index: 3;
    }

    .lane {
      border: 1px solid color-mix(in srgb, var(--lane-color) 35%, transparent);
      background: color-mix(in srgb, var(--lane-color) 13%, transparent);
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      touch-action: manipulation;
    }

    .lane::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 24px;
      height: 10px;
      border-radius: 6px;
      background: var(--lane-color);
      box-shadow: 0 0 18px color-mix(in srgb, var(--lane-color) 45%, transparent);
    }

    .hit-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 41px;
      border-top: 2px dashed rgba(255, 255, 255, 0.42);
      z-index: 2;
    }

    .note {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      background: var(--color);
      box-shadow: 0 0 18px color-mix(in srgb, var(--color) 45%, transparent);
      z-index: 4;
      pointer-events: none;
    }

    .feedback {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 72px;
      text-align: center;
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
      color: var(--yellow);
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.34);
      opacity: 0;
      transform: scale(0.86);
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 5;
      pointer-events: none;
    }

    .feedback.show {
      opacity: 1;
      transform: scale(1);
    }

    .controls {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      display: grid;
      gap: 12px;
    }

    .progress {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: #dfe7df;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--teal);
      border-radius: inherit;
    }

    .transport-row {
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      gap: 10px;
    }

    .control-button {
      border: 0;
      min-height: 44px;
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
    }

    .play-button {
      display: grid;
      place-items: center;
    }

    .play-icon::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      border-left: 14px solid currentColor;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }

    .pause-icon::before,
    .pause-icon::after {
      content: "";
      position: absolute;
      top: 2px;
      width: 5px;
      height: 16px;
      border-radius: 2px;
      background: currentColor;
    }

    .pause-icon::before {
      left: 3px;
    }

    .pause-icon::after {
      right: 3px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-align: center;
      min-height: 18px;
    }

    .drawer {
      position: fixed;
      inset: auto 0 0;
      background: var(--surface);
      box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.18);
      border-radius: 12px 12px 0 0;
      padding: 18px;
      transform: translateY(105%);
      transition: transform 220ms ease;
      z-index: 10;
    }

    .drawer.open {
      transform: translateY(0);
    }

    .drawer-inner {
      width: min(100%, 520px);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
    }

    .source-grid {
      display: grid;
      gap: 8px;
    }

    .source {
      border: 1px solid #e3e8e2;
      background: #fafcf8;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      text-align: left;
      cursor: pointer;
    }

    .source-mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--teal);
    }

    .source:nth-child(2) .source-mark {
      background: var(--coral);
    }

    .source:nth-child(3) .source-mark {
      background: var(--yellow);
    }

    .source:nth-child(4) .source-mark {
      background: var(--lime);
    }

    .source-title {
      font-weight: 850;
    }

    .source-sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
    }

    .paste-panel {
      border: 1px solid #e3e8e2;
      background: #fafcf8;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .paste-title {
      font-weight: 850;
    }

    .paste-row {
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 8px;
    }

    .paste-row input {
      width: 100%;
      min-height: 40px;
      border: 1px solid #dbe2d9;
      border-radius: 8px;
      padding: 0 10px;
      background: var(--surface);
      color: var(--ink);
      min-width: 0;
    }

    .paste-row button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: var(--surface);
      font-weight: 850;
      cursor: pointer;
    }

    .link-hint {
      min-height: 17px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 380px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
        gap: 10px;
      }

      .stat {
        padding: 9px 8px;
      }

      .stat-value {
        font-size: 18px;
      }

      .arena {
        min-height: clamp(300px, 49svh, 390px);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar" aria-label="Current track">
      <div class="art" aria-hidden="true"></div>
      <div class="title-block">
        <h1 id="trackTitle">Neon Pocket</h1>
        <div class="subline" id="trackMeta">FingerTapper - Demo</div>
      </div>
      <button class="icon-button" id="sourcesButton" aria-label="Sources">
        <span class="playlist-icon" aria-hidden="true"></span>
      </button>
    </section>

    <section class="segmented" aria-label="Difficulty">
      <button type="button" data-difficulty="chill">Chill</button>
      <button type="button" data-difficulty="groove" class="active">Groove</button>
      <button type="button" data-difficulty="expert">Expert</button>
    </section>

    <section class="stats" aria-label="Stats">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Combo</div>
        <div class="stat-value" id="combo">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value" id="accuracy">100%</div>
      </div>
    </section>

    <section class="arena" id="arena" aria-label="Tap arena">
      <div class="lane-wrap" id="lanes"></div>
      <div class="hit-line" aria-hidden="true"></div>
      <div id="notes"></div>
      <div class="feedback" id="feedback">Perfect</div>
    </section>

    <section class="controls" aria-label="Transport">
      <div class="progress" aria-hidden="true"><span id="progress"></span></div>
      <div class="transport-row">
        <button class="control-button" id="restartButton" aria-label="Restart">Reset</button>
        <button class="control-button play-button" id="playButton" aria-label="Play">
          <span class="play-icon" aria-hidden="true"></span>
        </button>
        <button class="control-button" id="addButton" aria-label="Add music">Add</button>
      </div>
      <div class="status" id="status">124 BPM - generated preview</div>
    </section>
  </main>

  <aside class="drawer" id="drawer" aria-label="Sources">
    <div class="drawer-inner">
      <div class="drawer-head">
        <h2>Sources</h2>
        <button class="icon-button" id="closeDrawer" aria-label="Close">x</button>
      </div>
      <div class="source-grid">
        <button class="source" id="demoSource">
          <span class="source-mark" aria-hidden="true"></span>
          <span>
            <span class="source-title">Demo groove</span>
            <span class="source-sub">Generated beatmap</span>
          </span>
        </button>
        <button class="source" id="localSource">
          <span class="source-mark" aria-hidden="true"></span>
          <span>
            <span class="source-title">Local audio</span>
            <span class="source-sub">Play a file from this browser</span>
          </span>
        </button>
        <button class="source" id="appleSource">
          <span class="source-mark" aria-hidden="true"></span>
          <span>
            <span class="source-title">Apple Music</span>
            <span class="source-sub">Native iOS build connects with MusicKit</span>
          </span>
        </button>
        <button class="source" id="pasteSource">
          <span class="source-mark" aria-hidden="true"></span>
          <span>
            <span class="source-title">Paste link</span>
            <span class="source-sub">Spotify, YouTube, or YouTube Music</span>
          </span>
        </button>
      </div>
      <form class="paste-panel" id="linkForm">
        <div class="paste-title">Song or playlist link</div>
        <div class="paste-row">
          <input id="linkInput" type="text" inputmode="url" placeholder="https://open.spotify.com/playlist/...">
          <button type="submit">Use</button>
        </div>
        <div class="link-hint" id="linkHint"></div>
      </form>
      <input class="hidden-file" id="fileInput" type="file" accept="audio/*">
    </div>
  </aside>

  <audio id="audio"></audio>

  <script>
    const laneColors = ["#ff5a5f", "#00a896", "#f5c446", "#99db52"];
    const difficulties = {
      chill: { lanes: 1, stride: 2, perfect: 0.075, great: 0.13, good: 0.2 },
      groove: { lanes: 2, stride: 1, perfect: 0.055, great: 0.105, good: 0.16 },
      expert: { lanes: 4, stride: 1, perfect: 0.042, great: 0.085, good: 0.13 }
    };

    const state = {
      trackTitle: "Neon Pocket",
      artist: "FingerTapper",
      source: "Demo",
      bpm: 124,
      duration: 96,
      difficulty: "groove",
      startedAt: 0,
      pausedAt: 0,
      running: false,
      events: [],
      hitIds: new Set(),
      missedIds: new Set(),
      score: 0,
      combo: 0,
      judged: 0,
      accuracyTotal: 0,
      raf: 0
    };

    const els = {
      trackTitle: document.getElementById("trackTitle"),
      trackMeta: document.getElementById("trackMeta"),
      score: document.getElementById("score"),
      combo: document.getElementById("combo"),
      accuracy: document.getElementById("accuracy"),
      arena: document.getElementById("arena"),
      lanes: document.getElementById("lanes"),
      notes: document.getElementById("notes"),
      feedback: document.getElementById("feedback"),
      progress: document.getElementById("progress"),
      status: document.getElementById("status"),
      playButton: document.getElementById("playButton"),
      restartButton: document.getElementById("restartButton"),
      drawer: document.getElementById("drawer"),
      linkForm: document.getElementById("linkForm"),
      linkInput: document.getElementById("linkInput"),
      linkHint: document.getElementById("linkHint"),
      fileInput: document.getElementById("fileInput"),
      audio: document.getElementById("audio")
    };

    function generateBeatmap(bpm, duration, seed) {
      const interval = 60 / bpm;
      const events = [];
      let beat = 0;
      let time = 0.45;
      while (time < duration) {
        const accent = beat % 4 === 0;
        const syncopation = beat % 8 === 6;
        if (accent || syncopation || beat % 2 === 0) {
          const lane = Math.abs(seed + beat * 7) % 4;
          events.push({
            id: events.length,
            time,
            intensity: accent ? 1 : syncopation ? 0.78 : 0.58,
            lane,
            accent
          });
        }
        beat += 1;
        time += interval;
      }
      return events;
    }

    function clock() {
      if (!state.running) return state.pausedAt;
      return Math.min((performance.now() - state.startedAt) / 1000, state.duration);
    }

    function playableEvents() {
      const cfg = difficulties[state.difficulty];
      return state.events
        .filter((_, index) => index % cfg.stride === 0)
        .map(event => ({ ...event, lane: event.lane % cfg.lanes }));
    }

    function setDifficulty(name) {
      state.difficulty = name;
      document.querySelectorAll("[data-difficulty]").forEach(button => {
        button.classList.toggle("active", button.dataset.difficulty === name);
      });
      renderLanes();
      render();
    }

    function renderLanes() {
      const cfg = difficulties[state.difficulty];
      els.lanes.style.gridTemplateColumns = `repeat(${cfg.lanes}, 1fr)`;
      els.lanes.innerHTML = "";
      for (let i = 0; i < cfg.lanes; i += 1) {
        const button = document.createElement("button");
        button.className = "lane";
        button.type = "button";
        button.setAttribute("aria-label", `Lane ${i + 1}`);
        button.style.setProperty("--lane-color", laneColors[i % laneColors.length]);
        button.addEventListener("click", () => tap(i));
        els.lanes.appendChild(button);
      }
    }

    function start() {
      if (state.running) return;
      state.running = true;
      state.startedAt = performance.now() - state.pausedAt * 1000;
      els.audio.play().catch(() => {});
      setPlayIcon(true);
      loop();
    }

    function pause() {
      if (!state.running) return;
      state.pausedAt = clock();
      state.running = false;
      cancelAnimationFrame(state.raf);
      els.audio.pause();
      setPlayIcon(false);
      render();
    }

    function restart() {
      pause();
      state.pausedAt = 0;
      state.score = 0;
      state.combo = 0;
      state.judged = 0;
      state.accuracyTotal = 0;
      state.hitIds = new Set();
      state.missedIds = new Set();
      els.audio.currentTime = 0;
      renderStats();
      render();
    }

    function tap(lane) {
      const t = clock();
      const cfg = difficulties[state.difficulty];
      const candidates = playableEvents()
        .filter(event => !state.hitIds.has(event.id))
        .filter(event => !state.missedIds.has(event.id))
        .filter(event => event.lane === lane)
        .filter(event => Math.abs(event.time - t) <= cfg.good + 0.09);

      if (!candidates.length) {
        register("Miss", 0, null);
        return;
      }

      candidates.sort((a, b) => Math.abs(a.time - t) - Math.abs(b.time - t));
      const event = candidates[0];
      const offset = t - event.time;
      const distance = Math.abs(offset);
      let judgement = "Miss";
      let weight = 0;
      let points = 0;
      if (distance <= cfg.perfect) {
        judgement = "Perfect";
        weight = 1;
        points = 1000;
      } else if (distance <= cfg.great) {
        judgement = "Great";
        weight = 0.78;
        points = 700;
      } else if (distance <= cfg.good) {
        judgement = "Good";
        weight = 0.48;
        points = 400;
      }

      if (judgement === "Miss") state.missedIds.add(event.id);
      else state.hitIds.add(event.id);

      register(judgement, weight, points);
    }

    function register(judgement, weight, points) {
      state.judged += 1;
      state.accuracyTotal += weight;
      if (judgement === "Miss") {
        state.combo = 0;
      } else {
        state.combo += 1;
        state.score += points + state.combo * 8;
      }
      flash(judgement);
      renderStats();
    }

    function flash(judgement) {
      els.feedback.textContent = judgement;
      els.feedback.style.color = judgement === "Miss"
        ? "var(--coral)"
        : judgement === "Good"
          ? "var(--teal)"
          : judgement === "Great"
            ? "var(--lime)"
            : "var(--yellow)";
      els.feedback.classList.remove("show");
      void els.feedback.offsetWidth;
      els.feedback.classList.add("show");
      window.setTimeout(() => els.feedback.classList.remove("show"), 260);
    }

    function markExpired(t) {
      const cfg = difficulties[state.difficulty];
      playableEvents()
        .filter(event => event.time < t - cfg.good)
        .filter(event => !state.hitIds.has(event.id) && !state.missedIds.has(event.id))
        .slice(0, 4)
        .forEach(event => {
          state.missedIds.add(event.id);
          register("Miss", 0, 0);
        });
    }

    function renderStats() {
      els.score.textContent = String(state.score);
      els.combo.textContent = String(state.combo);
      const accuracy = state.judged ? Math.round((state.accuracyTotal / state.judged) * 100) : 100;
      els.accuracy.textContent = `${accuracy}%`;
    }

    function render() {
      const t = clock();
      const cfg = difficulties[state.difficulty];
      const lead = 2.4;
      const rect = els.arena.getBoundingClientRect();
      const hitY = rect.height - 41;
      const laneWidth = rect.width / cfg.lanes;
      const upcoming = playableEvents()
        .filter(event => event.time >= t && event.time <= t + lead)
        .filter(event => !state.hitIds.has(event.id) && !state.missedIds.has(event.id));

      els.trackTitle.textContent = state.trackTitle;
      els.trackMeta.textContent = `${state.artist} - ${state.source}`;
      els.progress.style.width = `${Math.min(100, (t / state.duration) * 100)}%`;
      els.notes.innerHTML = "";

      upcoming.forEach(event => {
        const remaining = Math.max(event.time - t, 0);
        const travel = 1 - Math.min(remaining / lead, 1);
        const note = document.createElement("div");
        note.className = "note";
        note.style.setProperty("--size", `${18 + event.intensity * 12}px`);
        note.style.setProperty("--color", laneColors[event.lane % laneColors.length]);
        note.style.setProperty("--x", `${laneWidth * event.lane + laneWidth / 2}px`);
        note.style.setProperty("--y", `${18 + (hitY - 18) * travel}px`);
        els.notes.appendChild(note);
      });
    }

    function loop() {
      const t = clock();
      markExpired(t);
      render();
      if (t >= state.duration) {
        pause();
        return;
      }
      state.raf = requestAnimationFrame(loop);
    }

    function setPlayIcon(running) {
      els.playButton.innerHTML = `<span class="${running ? "pause-icon" : "play-icon"}" aria-hidden="true"></span>`;
      els.playButton.setAttribute("aria-label", running ? "Pause" : "Play");
    }

    function loadDemo() {
      restart();
      state.trackTitle = "Neon Pocket";
      state.artist = "FingerTapper";
      state.source = "Demo";
      state.bpm = 124;
      state.duration = 96;
      state.events = generateBeatmap(state.bpm, state.duration, 19);
      els.audio.removeAttribute("src");
      els.status.textContent = "124 BPM - generated preview";
      closeDrawer();
      render();
    }

    function loadLocalFile(file) {
      if (!file) return;
      restart();
      const url = URL.createObjectURL(file);
      els.audio.src = url;
      els.audio.onloadedmetadata = () => {
        state.duration = Number.isFinite(els.audio.duration) ? els.audio.duration : 120;
        const seed = Array.from(file.name).reduce((sum, char) => sum + char.charCodeAt(0), 0);
        state.bpm = [92, 100, 108, 116, 124, 132, 140][seed % 7];
        state.trackTitle = file.name.replace(/\.[^.]+$/, "");
        state.artist = "Local File";
        state.source = "Browser";
        state.events = generateBeatmap(state.bpm, state.duration, seed);
        els.status.textContent = `${state.bpm} BPM - local preview`;
        closeDrawer();
        render();
      };
      els.audio.load();
    }

    function parseMusicLink(rawValue) {
      const value = rawValue.trim();
      if (!value) {
        throw new Error("Paste a Spotify, YouTube, or YouTube Music link.");
      }

      const spotifyUri = value.match(/^spotify:(track|playlist|album):([A-Za-z0-9]+)$/i);
      if (spotifyUri) {
        return linkedItem("Spotify", spotifyUri[1], spotifyUri[2], "spotify");
      }

      let url;
      try {
        url = new URL(value);
      } catch {
        throw new Error("That link does not look like a valid URL.");
      }

      const host = url.hostname.replace(/^www\./, "").toLowerCase();
      const pathParts = url.pathname.split("/").filter(Boolean);

      if (host === "open.spotify.com") {
        const [kind, id] = pathParts;
        if (["track", "playlist", "album"].includes(kind) && id) {
          return linkedItem("Spotify", kind, id, "spotify");
        }
      }

      if (host === "youtu.be" && pathParts[0]) {
        return linkedItem("YouTube", "video", pathParts[0], "youtube");
      }

      if (host === "youtube.com" || host === "m.youtube.com" || host === "music.youtube.com") {
        const provider = host === "music.youtube.com" ? "YouTube Music" : "YouTube";
        const flavor = host === "music.youtube.com" ? "youtube-music" : "youtube";
        const playlistId = url.searchParams.get("list");
        const videoId = url.searchParams.get("v") || (pathParts[0] === "shorts" ? pathParts[1] : "");
        const isRadioMix = playlistId && (playlistId.startsWith("RD") || url.searchParams.get("start_radio") === "1");

        if (playlistId && pathParts[0] === "playlist") {
          return linkedItem(provider, "playlist", playlistId, flavor);
        }

        if (isRadioMix) {
          return linkedItem(provider, "mix", playlistId, flavor);
        }

        if (videoId) {
          return linkedItem(provider, "video", videoId, flavor);
        }

        if (playlistId) {
          return linkedItem(provider, "playlist", playlistId, flavor);
        }
      }

      throw new Error("Supported links: Spotify tracks/playlists/albums and YouTube videos/playlists.");
    }

    function linkedItem(provider, kind, id, flavor) {
      const normalizedKind = kind === "track" ? "song" : kind;
      const titleKind = normalizedKind === "mix" ? "mix" : normalizedKind;
      const title = `${provider} ${titleKind}`;
      const seed = Array.from(`${provider}:${kind}:${id}`).reduce((sum, char) => sum + char.charCodeAt(0), 0);
      const bpmChoices = [92, 100, 108, 116, 124, 132, 140];
      return {
        provider,
        kind: normalizedKind,
        id,
        flavor,
        title,
        bpm: bpmChoices[seed % bpmChoices.length],
        duration: ["playlist", "mix"].includes(normalizedKind) ? 128 : 92,
        seed
      };
    }

    function loadLinkedItem(item) {
      restart();
      state.trackTitle = item.title;
      state.artist = ["playlist", "mix"].includes(item.kind) ? "Imported playlist" : "Imported song";
      state.source = item.provider;
      state.bpm = item.bpm;
      state.duration = item.duration;
      state.events = generateBeatmap(item.bpm, item.duration, item.seed);
      els.audio.removeAttribute("src");
      els.status.textContent = `${item.provider} ${item.kind} - generated beatmap`;
      els.linkHint.textContent = `${item.provider} link added`;
      closeDrawer();
      render();
    }

    function openDrawer() {
      els.drawer.classList.add("open");
    }

    function closeDrawer() {
      els.drawer.classList.remove("open");
    }

    document.querySelectorAll("[data-difficulty]").forEach(button => {
      button.addEventListener("click", () => setDifficulty(button.dataset.difficulty));
    });
    document.getElementById("sourcesButton").addEventListener("click", openDrawer);
    document.getElementById("addButton").addEventListener("click", openDrawer);
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    document.getElementById("demoSource").addEventListener("click", loadDemo);
    document.getElementById("localSource").addEventListener("click", () => els.fileInput.click());
    document.getElementById("appleSource").addEventListener("click", () => {
      els.status.textContent = "Apple Music connects in the native iOS project";
      closeDrawer();
    });
    document.getElementById("pasteSource").addEventListener("click", () => {
      els.linkInput.focus();
    });
    els.linkForm.addEventListener("submit", event => {
      event.preventDefault();
      try {
        loadLinkedItem(parseMusicLink(els.linkInput.value));
      } catch (error) {
        els.linkHint.textContent = error.message;
      }
    });
    els.fileInput.addEventListener("change", event => loadLocalFile(event.target.files[0]));
    els.playButton.addEventListener("click", () => state.running ? pause() : start());
    els.restartButton.addEventListener("click", restart);
    window.addEventListener("resize", render);
    window.addEventListener("keydown", event => {
      const cfg = difficulties[state.difficulty];
      const index = Number(event.key) - 1;
      if (index >= 0 && index < cfg.lanes) tap(index);
      if (event.code === "Space") {
        event.preventDefault();
        state.running ? pause() : start();
      }
    });

    state.events = generateBeatmap(state.bpm, state.duration, 19);
    renderLanes();
    renderStats();
    render();
  </script>
</body>
</html>
