<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4f6f1">
  <meta name="description" content="MusicTap is a mobile rhythm game for connected music services, shared links, and local audio.">
  <meta name="app-version" content="connected-picker-2026-06-12">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <title>MusicTap</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f4f6f1;
      --ink: #15171a;
      --muted: #687078;
      --surface: #ffffff;
      --coral: #ff5a5f;
      --teal: #00a896;
      --yellow: #f5c446;
      --lime: #99db52;
      --shadow: 0 18px 45px rgba(15, 18, 22, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      user-select: none;
    }

    input {
      user-select: text;
    }

    .shell {
      width: min(100%, 560px);
      min-height: 100vh;
      min-height: 100svh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: calc(14px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: grid;
      grid-template-columns: 54px 1fr 46px;
      gap: 12px;
      align-items: center;
    }

    .art {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(245, 196, 70, 0.95), rgba(255, 90, 95, 0.92)),
        #15171a;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .art::before,
    .art::after {
      content: "";
      position: absolute;
      inset: 13px 18px;
      border: 4px solid rgba(21, 23, 26, 0.76);
      border-left: 0;
      border-radius: 0 18px 18px 0;
    }

    .art::after {
      inset: 20px 12px 12px 28px;
      border-color: rgba(255, 255, 255, 0.78);
    }

    .title-block {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.15;
      font-weight: 850;
    }

    .subline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      width: 46px;
      height: 46px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      display: grid;
      place-items: center;
      position: relative;
    }

    .icon-button span,
    .play-button span {
      display: block;
      width: 18px;
      height: 18px;
      position: relative;
    }

    .playlist-icon::before,
    .playlist-icon::after {
      content: "";
      position: absolute;
      left: 0;
      right: 6px;
      height: 3px;
      background: currentColor;
      border-radius: 3px;
    }

    .playlist-icon::before {
      top: 3px;
      box-shadow: 0 6px 0 currentColor;
    }

    .playlist-icon::after {
      width: 5px;
      height: 5px;
      left: 13px;
      top: 12px;
      border-radius: 50%;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #e7ece5;
      padding: 4px;
      border-radius: 8px;
      gap: 4px;
    }

    .segmented button {
      border: 0;
      min-height: 32px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
      cursor: pointer;
    }

    .segmented button.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.07);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      padding: 7px;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.05);
    }

    .stat {
      padding: 3px 10px;
      text-align: center;
      min-width: 0;
    }

    .stat + .stat {
      border-left: 1px solid #e7ece5;
    }

    .stat-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    .stat-value {
      margin-top: 2px;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arena {
      flex: 1;
      min-height: clamp(320px, 48svh, 470px);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        #15171a;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      touch-action: manipulation;
    }

    .lane-wrap {
      position: absolute;
      inset: 10px;
      display: grid;
      gap: 7px;
      z-index: 3;
    }

    .lane {
      border: 1px solid color-mix(in srgb, var(--lane-color) 35%, transparent);
      background: color-mix(in srgb, var(--lane-color) 13%, transparent);
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      touch-action: manipulation;
    }

    .lane::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 24px;
      height: 10px;
      border-radius: 6px;
      background: var(--lane-color);
      box-shadow: 0 0 18px color-mix(in srgb, var(--lane-color) 45%, transparent);
    }

    .hit-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 41px;
      border-top: 2px dashed rgba(255, 255, 255, 0.42);
      z-index: 2;
    }

    .note {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      background: var(--color);
      box-shadow: 0 0 18px color-mix(in srgb, var(--color) 45%, transparent);
      z-index: 4;
      pointer-events: none;
    }

    .feedback {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 72px;
      text-align: center;
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
      color: var(--yellow);
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.34);
      opacity: 0;
      transform: scale(0.86);
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 5;
      pointer-events: none;
    }

    .feedback.show {
      opacity: 1;
      transform: scale(1);
    }

    .provider-player {
      background: var(--surface);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    .provider-player[hidden] {
      display: none;
    }

    .provider-mount {
      min-height: 152px;
      overflow: hidden;
      border-radius: 8px;
      background: #101214;
      display: grid;
      place-items: center;
    }

    .provider-mount.youtube {
      min-height: 200px;
      aspect-ratio: 16 / 9;
    }

    .provider-mount iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 152px;
      border: 0;
    }

    .provider-mount.youtube iframe {
      min-height: 200px;
    }

    .provider-bar {
      min-height: 38px;
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .provider-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .provider-open {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--ink);
      color: var(--surface);
      text-decoration: none;
      font-size: 13px;
      font-weight: 850;
      display: inline-grid;
      place-items: center;
    }

    body.provider-active .arena {
      min-height: clamp(270px, 40svh, 390px);
    }

    .controls {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      display: grid;
      gap: 12px;
    }

    .progress {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: #dfe7df;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--teal);
      border-radius: inherit;
    }

    .transport-row {
      display: grid;
      grid-template-columns: 48px 1fr 92px;
      gap: 10px;
    }

    .control-button {
      border: 0;
      min-height: 44px;
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
    }

    .play-button {
      display: grid;
      place-items: center;
      background: var(--teal);
      color: #ffffff;
    }

    #addButton {
      background: var(--ink);
      color: #ffffff;
    }

    .play-icon::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      border-left: 14px solid currentColor;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }

    .pause-icon::before,
    .pause-icon::after {
      content: "";
      position: absolute;
      top: 2px;
      width: 5px;
      height: 16px;
      border-radius: 2px;
      background: currentColor;
    }

    .pause-icon::before {
      left: 3px;
    }

    .pause-icon::after {
      right: 3px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-align: center;
      min-height: 18px;
    }

    .drawer {
      position: fixed;
      inset: 0;
      background: var(--surface);
      padding: calc(16px + env(safe-area-inset-top)) 18px calc(20px + env(safe-area-inset-bottom));
      display: none;
      z-index: 10;
      overflow-y: auto;
    }

    .drawer.open {
      display: block;
    }

    .drawer-inner {
      width: min(100%, 560px);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 22px;
    }

    .provider-grid {
      display: grid;
      gap: 8px;
    }

    .provider-option {
      border: 1px solid #e3e8e2;
      background: #fafcf8;
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      text-align: left;
    }

    .provider-option.active {
      border-color: var(--ink);
      background: var(--surface);
    }

    .provider-main {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      cursor: pointer;
    }

    .provider-mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      color: #ffffff;
      background: #1ed760;
      display: grid;
      place-items: center;
      font-weight: 950;
      font-size: 17px;
    }

    .provider-option[data-provider="youtube"] .provider-mark {
      background: #ff0033;
    }

    .provider-option[data-provider="apple"] .provider-mark {
      background: #ef476f;
    }

    .provider-title {
      display: block;
      font-weight: 850;
    }

    .provider-state {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .connect-button {
      border: 0;
      border-radius: 8px;
      min-height: 36px;
      padding: 0 11px;
      background: var(--paper);
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .connect-button.connected {
      background: var(--ink);
      color: #ffffff;
    }

    .paste-panel {
      display: grid;
      gap: 8px;
    }

    .paste-title {
      font-size: 14px;
      font-weight: 850;
    }

    .paste-row {
      display: grid;
      grid-template-columns: 1fr 66px 70px;
      gap: 8px;
    }

    .paste-row input {
      width: 100%;
      min-height: 40px;
      border: 1px solid #dbe2d9;
      border-radius: 8px;
      padding: 0 10px;
      background: var(--surface);
      color: var(--ink);
      min-width: 0;
    }

    .paste-row button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
    }

    .paste-row button[type="submit"] {
      background: var(--ink);
      color: var(--surface);
    }

    .link-hint {
      min-height: 17px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .picker-section {
      display: grid;
      gap: 8px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 14px;
      font-weight: 850;
    }

    .result-list,
    .recent-list {
      display: grid;
      gap: 7px;
    }

    .result-list:empty,
    .recent-list:empty {
      display: none;
    }

    .music-result {
      border: 1px solid #e3e8e2;
      border-radius: 8px;
      background: #fafcf8;
      padding: 10px;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      text-align: left;
      cursor: pointer;
    }

    .result-art {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      background: #e7ece5;
    }

    .result-art.placeholder {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 900;
    }

    .result-title {
      display: block;
      font-size: 14px;
      font-weight: 850;
    }

    .result-sub {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .result-play {
      color: var(--teal);
      font-size: 18px;
      font-weight: 950;
    }

    .utility-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .utility-button {
      border: 1px solid #e3e8e2;
      border-radius: 8px;
      min-height: 44px;
      background: #fafcf8;
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 380px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
        gap: 10px;
      }

      .stat {
        padding: 9px 8px;
      }

      .stat-value {
        font-size: 18px;
      }

      .arena {
        min-height: clamp(300px, 49svh, 390px);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar" aria-label="Current track">
      <div class="art" aria-hidden="true"></div>
      <div class="title-block">
        <h1 id="trackTitle">Neon Pocket</h1>
        <div class="subline" id="trackMeta">FingerTapper - Demo</div>
      </div>
      <button class="icon-button" id="sourcesButton" aria-label="Choose music">
        <span class="playlist-icon" aria-hidden="true"></span>
      </button>
    </section>

    <section class="segmented" aria-label="Difficulty">
      <button type="button" data-difficulty="chill">Chill</button>
      <button type="button" data-difficulty="groove" class="active">Groove</button>
      <button type="button" data-difficulty="expert">Expert</button>
    </section>

    <section class="stats" aria-label="Stats">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Combo</div>
        <div class="stat-value" id="combo">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value" id="accuracy">100%</div>
      </div>
    </section>

    <section class="arena" id="arena" aria-label="Tap arena">
      <div class="lane-wrap" id="lanes"></div>
      <div class="hit-line" aria-hidden="true"></div>
      <div id="notes"></div>
      <div class="feedback" id="feedback">Perfect</div>
    </section>

    <section class="controls" aria-label="Transport">
      <div class="progress" aria-hidden="true"><span id="progress"></span></div>
      <div class="transport-row">
        <button class="control-button" id="restartButton" aria-label="Restart">Reset</button>
        <button class="control-button play-button" id="playButton" aria-label="Play">
          <span class="play-icon" aria-hidden="true"></span>
        </button>
        <button class="control-button" id="addButton" aria-label="Choose music">Music</button>
      </div>
      <div class="status" id="status">124 BPM - generated preview</div>
    </section>

    <section class="provider-player" id="providerPlayer" aria-label="Music player" hidden>
      <div class="provider-mount" id="providerMount"></div>
      <div class="provider-bar">
        <div class="provider-label" id="providerLabel"></div>
        <a class="provider-open" id="providerOpen" href="#" target="_blank" rel="noopener">Open app</a>
      </div>
    </section>
  </main>

  <aside class="drawer" id="drawer" aria-label="Choose music">
    <div class="drawer-inner">
      <div class="drawer-head">
        <h2>Choose music</h2>
        <button class="icon-button" id="closeDrawer" aria-label="Close">x</button>
      </div>
      <div class="provider-grid" aria-label="Music services">
        <div class="provider-option active" data-provider="spotify">
          <button class="provider-main" type="button" data-select-provider="spotify" aria-label="Use Spotify">
            <span class="provider-mark" aria-hidden="true">S</span>
            <span>
              <span class="provider-title">Spotify</span>
              <span class="provider-state" id="spotifyState">Paste links</span>
            </span>
          </button>
          <button class="connect-button" type="button" data-connect-provider="spotify">Sign in</button>
        </div>
        <div class="provider-option" data-provider="youtube">
          <button class="provider-main" type="button" data-select-provider="youtube" aria-label="Use YouTube Music">
            <span class="provider-mark" aria-hidden="true">Y</span>
            <span>
              <span class="provider-title">YouTube Music</span>
              <span class="provider-state" id="youtubeState">Paste links</span>
            </span>
          </button>
          <button class="connect-button" type="button" data-connect-provider="youtube">Sign in</button>
        </div>
        <div class="provider-option" data-provider="apple">
          <button class="provider-main" type="button" data-select-provider="apple" aria-label="Use Apple Music">
            <span class="provider-mark" aria-hidden="true">A</span>
            <span>
              <span class="provider-title">Apple Music</span>
              <span class="provider-state" id="appleState">Paste links</span>
            </span>
          </button>
          <button class="connect-button" type="button" data-connect-provider="apple">Sign in</button>
        </div>
      </div>
      <form class="paste-panel" id="linkForm">
        <div class="paste-title" id="pickerPrompt">Search Spotify or paste a song link</div>
        <div class="paste-row">
          <input id="linkInput" type="text" placeholder="Search or paste a link">
          <button type="button" id="pasteButton">Paste</button>
          <button type="submit">Play</button>
        </div>
        <div class="link-hint" id="linkHint"></div>
      </form>
      <section class="picker-section" id="resultsSection" hidden>
        <div class="section-head">Results</div>
        <div class="result-list" id="searchResults"></div>
      </section>
      <section class="picker-section" id="recentSection" hidden>
        <div class="section-head">Recently played</div>
        <div class="recent-list" id="recentList"></div>
      </section>
      <div class="utility-row">
        <button class="utility-button" id="localSource" type="button">Audio file</button>
        <button class="utility-button" id="demoSource" type="button">Demo groove</button>
      </div>
      <input class="hidden-file" id="fileInput" type="file" accept="audio/*">
    </div>
  </aside>

  <audio id="audio"></audio>

  <script>
    const laneColors = ["#ff5a5f", "#00a896", "#f5c446", "#99db52"];
    const difficulties = {
      chill: { lanes: 1, stride: 2, perfect: 0.075, great: 0.13, good: 0.2 },
      groove: { lanes: 2, stride: 1, perfect: 0.055, great: 0.105, good: 0.16 },
      expert: { lanes: 4, stride: 1, perfect: 0.042, great: 0.085, good: 0.13 }
    };

    const state = {
      trackTitle: "Neon Pocket",
      artist: "FingerTapper",
      source: "Demo",
      bpm: 124,
      duration: 96,
      difficulty: "groove",
      startedAt: 0,
      pausedAt: 0,
      running: false,
      playbackType: "demo",
      linkedItem: null,
      selectedProvider: "spotify",
      events: [],
      hitIds: new Set(),
      missedIds: new Set(),
      score: 0,
      combo: 0,
      judged: 0,
      accuracyTotal: 0,
      raf: 0
    };

    const els = {
      trackTitle: document.getElementById("trackTitle"),
      trackMeta: document.getElementById("trackMeta"),
      score: document.getElementById("score"),
      combo: document.getElementById("combo"),
      accuracy: document.getElementById("accuracy"),
      arena: document.getElementById("arena"),
      lanes: document.getElementById("lanes"),
      notes: document.getElementById("notes"),
      feedback: document.getElementById("feedback"),
      progress: document.getElementById("progress"),
      status: document.getElementById("status"),
      playButton: document.getElementById("playButton"),
      restartButton: document.getElementById("restartButton"),
      providerPlayer: document.getElementById("providerPlayer"),
      providerMount: document.getElementById("providerMount"),
      providerLabel: document.getElementById("providerLabel"),
      providerOpen: document.getElementById("providerOpen"),
      drawer: document.getElementById("drawer"),
      linkForm: document.getElementById("linkForm"),
      linkInput: document.getElementById("linkInput"),
      linkHint: document.getElementById("linkHint"),
      pickerPrompt: document.getElementById("pickerPrompt"),
      pasteButton: document.getElementById("pasteButton"),
      resultsSection: document.getElementById("resultsSection"),
      searchResults: document.getElementById("searchResults"),
      recentSection: document.getElementById("recentSection"),
      recentList: document.getElementById("recentList"),
      spotifyState: document.getElementById("spotifyState"),
      youtubeState: document.getElementById("youtubeState"),
      appleState: document.getElementById("appleState"),
      fileInput: document.getElementById("fileInput"),
      audio: document.getElementById("audio")
    };

    let youtubeApiPromise = null;
    let youtubePlayer = null;
    let spotifyApiPromise = null;
    let spotifyController = null;
    let googleIdentityPromise = null;
    let googleTokenClient = null;
    let appleMusicPromise = null;

    const integration = {
      config: {
        spotifyClientId: "",
        googleClientId: "",
        appleMusicDeveloperToken: "",
        appleMusicStorefront: "us"
      },
      spotifyToken: sessionStorage.getItem("musictap_spotify_token") || "",
      googleToken: sessionStorage.getItem("musictap_google_token") || "",
      appleMusic: null,
      appleConnected: false,
      appleQueueId: ""
    };

    const providerDetails = {
      spotify: {
        label: "Spotify",
        prompt: "Search Spotify or paste a song link",
        fallbackUrl: "https://accounts.spotify.com/login"
      },
      youtube: {
        label: "YouTube Music",
        prompt: "Search YouTube Music or paste a link",
        fallbackUrl: "https://music.youtube.com/"
      },
      apple: {
        label: "Apple Music",
        prompt: "Search Apple Music or paste a link",
        fallbackUrl: "https://music.apple.com/"
      }
    };

    async function loadIntegrationConfig() {
      try {
        const response = await fetch("/api/musictap/config", { cache: "no-store" });
        if (response.ok) {
          integration.config = { ...integration.config, ...await response.json() };
        }
        await handleSpotifyCallback();
      } catch {
        // Static previews continue to support provider-owned sign-in and pasted links.
      }
      renderProviderConnections();
    }

    function renderProviderConnections() {
      const connectionState = {
        spotify: {
          configured: Boolean(integration.config.spotifyClientId),
          connected: Boolean(integration.spotifyToken),
          element: els.spotifyState
        },
        youtube: {
          configured: Boolean(integration.config.googleClientId),
          connected: Boolean(integration.googleToken),
          element: els.youtubeState
        },
        apple: {
          configured: Boolean(integration.config.appleMusicDeveloperToken),
          connected: integration.appleConnected,
          element: els.appleState
        }
      };

      document.querySelectorAll("[data-connect-provider]").forEach(button => {
        const provider = button.dataset.connectProvider;
        const status = connectionState[provider];
        if (!status) return;
        status.element.textContent = status.connected
          ? "Connected - search ready"
          : status.configured
            ? "Connect to search"
            : "Sign in, then paste a link";
        button.textContent = status.connected ? "Connected" : status.configured ? "Connect" : "Sign in";
        button.classList.toggle("connected", status.connected);
      });
    }

    function selectProvider(provider) {
      state.selectedProvider = provider;
      document.querySelectorAll(".provider-option").forEach(option => {
        option.classList.toggle("active", option.dataset.provider === provider);
      });
      els.pickerPrompt.textContent = providerDetails[provider].prompt;
      els.linkInput.placeholder = providerDetails[provider].prompt;
      els.linkHint.textContent = "";
      clearSearchResults();
      els.linkInput.focus();
    }

    async function connectProvider(provider) {
      selectProvider(provider);
      try {
        if (provider === "spotify" && integration.config.spotifyClientId) {
          await beginSpotifyLogin();
          return;
        }
        if (provider === "youtube" && integration.config.googleClientId) {
          await connectYouTube();
          return;
        }
        if (provider === "apple" && integration.config.appleMusicDeveloperToken) {
          await connectAppleMusic();
          return;
        }
        window.open(providerDetails[provider].fallbackUrl, "_blank", "noopener");
        els.linkHint.textContent = `Sign in to ${providerDetails[provider].label}, then paste a song link`;
      } catch (error) {
        els.linkHint.textContent = error.message;
      }
    }

    function randomString(length = 64) {
      const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const values = crypto.getRandomValues(new Uint8Array(length));
      return Array.from(values, value => possible[value % possible.length]).join("");
    }

    function base64UrlEncode(input) {
      return btoa(String.fromCharCode(...new Uint8Array(input)))
        .replace(/=/g, "")
        .replace(/\+/g, "-")
        .replace(/\//g, "_");
    }

    function spotifyRedirectUri() {
      return `${window.location.origin}${window.location.pathname}`;
    }

    async function beginSpotifyLogin() {
      const verifier = randomString();
      const stateValue = randomString(24);
      const hashed = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
      sessionStorage.setItem("musictap_spotify_verifier", verifier);
      sessionStorage.setItem("musictap_spotify_state", stateValue);
      const authUrl = new URL("https://accounts.spotify.com/authorize");
      authUrl.search = new URLSearchParams({
        client_id: integration.config.spotifyClientId,
        response_type: "code",
        redirect_uri: spotifyRedirectUri(),
        scope: "user-read-private user-read-email",
        code_challenge_method: "S256",
        code_challenge: base64UrlEncode(hashed),
        state: stateValue
      }).toString();
      window.location.assign(authUrl.toString());
    }

    async function handleSpotifyCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const returnedState = params.get("state");
      if (!code || !integration.config.spotifyClientId) return;
      const expectedState = sessionStorage.getItem("musictap_spotify_state");
      const verifier = sessionStorage.getItem("musictap_spotify_verifier");
      if (!verifier || !expectedState || returnedState !== expectedState) {
        throw new Error("Spotify sign-in could not be verified.");
      }
      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          client_id: integration.config.spotifyClientId,
          grant_type: "authorization_code",
          code,
          redirect_uri: spotifyRedirectUri(),
          code_verifier: verifier
        })
      });
      if (!response.ok) throw new Error("Spotify sign-in failed.");
      const token = await response.json();
      integration.spotifyToken = token.access_token;
      sessionStorage.setItem("musictap_spotify_token", token.access_token);
      sessionStorage.removeItem("musictap_spotify_state");
      sessionStorage.removeItem("musictap_spotify_verifier");
      history.replaceState({}, "", window.location.pathname);
      openDrawer();
      selectProvider("spotify");
      els.linkHint.textContent = "Spotify connected";
    }

    function ensureGoogleIdentity() {
      if (window.google?.accounts?.oauth2) return Promise.resolve(window.google);
      if (googleIdentityPromise) return googleIdentityPromise;
      googleIdentityPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://accounts.google.com/gsi/client";
        script.async = true;
        script.onload = () => resolve(window.google);
        script.onerror = () => reject(new Error("Google sign-in could not load."));
        document.head.appendChild(script);
      });
      return googleIdentityPromise;
    }

    async function connectYouTube() {
      const google = await ensureGoogleIdentity();
      googleTokenClient ||= google.accounts.oauth2.initTokenClient({
        client_id: integration.config.googleClientId,
        scope: "https://www.googleapis.com/auth/youtube.readonly",
        callback: response => {
          if (!response.access_token) {
            els.linkHint.textContent = response.error || "YouTube Music sign-in failed";
            return;
          }
          integration.googleToken = response.access_token;
          sessionStorage.setItem("musictap_google_token", response.access_token);
          renderProviderConnections();
          els.linkHint.textContent = "YouTube Music connected";
        }
      });
      googleTokenClient.requestAccessToken({ prompt: integration.googleToken ? "" : "consent" });
    }

    function ensureAppleMusic() {
      if (integration.appleMusic) return Promise.resolve(integration.appleMusic);
      if (appleMusicPromise) return appleMusicPromise;
      appleMusicPromise = new Promise((resolve, reject) => {
        const configure = async () => {
          try {
            await window.MusicKit.configure({
              developerToken: integration.config.appleMusicDeveloperToken,
              app: { name: "MusicTap", build: "1.0.0" }
            });
            integration.appleMusic = window.MusicKit.getInstance();
            resolve(integration.appleMusic);
          } catch {
            reject(new Error("Apple Music could not connect."));
          }
        };
        if (window.MusicKit) {
          configure();
          return;
        }
        document.addEventListener("musickitloaded", configure, { once: true });
        const script = document.createElement("script");
        script.src = "https://js-cdn.music.apple.com/musickit/v3/musickit.js";
        script.async = true;
        script.onerror = () => reject(new Error("Apple Music could not load."));
        document.head.appendChild(script);
      });
      return appleMusicPromise;
    }

    async function connectAppleMusic() {
      const music = await ensureAppleMusic();
      await music.authorize();
      integration.appleConnected = true;
      renderProviderConnections();
      els.linkHint.textContent = "Apple Music connected";
    }

    async function searchMusic(query) {
      els.linkHint.textContent = `Searching ${providerDetails[state.selectedProvider].label}`;
      clearSearchResults();
      let results = [];
      if (state.selectedProvider === "spotify") results = await searchSpotify(query);
      if (state.selectedProvider === "youtube") results = await searchYouTube(query);
      if (state.selectedProvider === "apple") results = await searchAppleMusic(query);
      renderSearchResults(results);
      els.linkHint.textContent = results.length ? `${results.length} songs found` : "No songs found";
    }

    async function searchSpotify(query) {
      if (!integration.spotifyToken) throw new Error("Connect Spotify to search. Links still work.");
      const url = new URL("https://api.spotify.com/v1/search");
      url.search = new URLSearchParams({ q: query, type: "track", limit: "10" }).toString();
      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${integration.spotifyToken}` }
      });
      if (!response.ok) throw new Error("Spotify search needs a fresh connection.");
      const data = await response.json();
      return (data.tracks?.items || []).filter(Boolean).map(track => ({
        title: track.name,
        subtitle: track.artists.map(artist => artist.name).join(", "),
        artwork: track.album?.images?.[track.album.images.length - 1]?.url || track.album?.images?.[0]?.url || "",
        item: linkedItem("Spotify", "track", track.id, "spotify", {
          title: track.name,
          artist: track.artists.map(artist => artist.name).join(", "),
          originalUrl: track.external_urls.spotify,
          spotifyUri: track.uri
        })
      }));
    }

    async function searchYouTube(query) {
      if (!integration.googleToken) throw new Error("Connect YouTube Music to search. Links still work.");
      const url = new URL("https://www.googleapis.com/youtube/v3/search");
      url.search = new URLSearchParams({
        part: "snippet",
        type: "video",
        videoCategoryId: "10",
        maxResults: "10",
        q: query
      }).toString();
      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${integration.googleToken}` }
      });
      if (!response.ok) throw new Error("YouTube Music search needs a fresh connection.");
      const data = await response.json();
      return (data.items || []).map(video => ({
        title: video.snippet.title,
        subtitle: video.snippet.channelTitle,
        artwork: video.snippet.thumbnails?.default?.url || "",
        item: linkedItem("YouTube Music", "video", video.id.videoId, "youtube-music", {
          title: video.snippet.title,
          artist: video.snippet.channelTitle,
          originalUrl: `https://music.youtube.com/watch?v=${video.id.videoId}`,
          videoId: video.id.videoId
        })
      }));
    }

    async function searchAppleMusic(query) {
      if (!integration.config.appleMusicDeveloperToken) {
        throw new Error("Connect Apple Music to search. Links still work.");
      }
      const storefront = integration.config.appleMusicStorefront || "us";
      const url = new URL(`https://api.music.apple.com/v1/catalog/${storefront}/search`);
      url.search = new URLSearchParams({ term: query, types: "songs", limit: "10" }).toString();
      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${integration.config.appleMusicDeveloperToken}` }
      });
      if (!response.ok) throw new Error("Apple Music search is unavailable.");
      const data = await response.json();
      return (data.results?.songs?.data || []).map(song => {
        const attributes = song.attributes || {};
        const artwork = attributes.artwork?.url?.replace("{w}", "80").replace("{h}", "80") || "";
        return {
          title: attributes.name || "Apple Music song",
          subtitle: attributes.artistName || "Apple Music",
          artwork,
          item: linkedItem("Apple Music", "song", song.id, "apple", {
            title: attributes.name || "Apple Music song",
            artist: attributes.artistName || "Apple Music",
            originalUrl: attributes.url,
            embedUrl: attributes.url?.replace("music.apple.com", "embed.music.apple.com"),
            appleKind: "song"
          })
        };
      });
    }

    function clearSearchResults() {
      els.searchResults.innerHTML = "";
      els.resultsSection.hidden = true;
    }

    function renderSearchResults(results) {
      els.searchResults.innerHTML = "";
      results.forEach(result => els.searchResults.appendChild(musicResultButton(result)));
      els.resultsSection.hidden = results.length === 0;
    }

    function musicResultButton(result) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "music-result";
      const art = result.artwork
        ? Object.assign(document.createElement("img"), { className: "result-art", src: result.artwork, alt: "" })
        : Object.assign(document.createElement("span"), { className: "result-art placeholder", textContent: "♪" });
      const text = document.createElement("span");
      const title = Object.assign(document.createElement("span"), { className: "result-title", textContent: result.title });
      const sub = Object.assign(document.createElement("span"), { className: "result-sub", textContent: result.subtitle });
      text.append(title, sub);
      const play = Object.assign(document.createElement("span"), { className: "result-play", textContent: "▶" });
      button.append(art, text, play);
      button.addEventListener("click", () => loadLinkedItem(result.item, true));
      return button;
    }

    function saveRecent(item) {
      try {
        const recent = JSON.parse(localStorage.getItem("musictap_recent") || "[]")
          .filter(saved => !(saved.provider === item.provider && saved.id === item.id));
        recent.unshift(item);
        localStorage.setItem("musictap_recent", JSON.stringify(recent.slice(0, 6)));
      } catch {
        // Recent songs are optional.
      }
      renderRecents();
    }

    function renderRecents() {
      let recent = [];
      try {
        recent = JSON.parse(localStorage.getItem("musictap_recent") || "[]");
      } catch {
        recent = [];
      }
      els.recentList.innerHTML = "";
      recent.forEach(item => {
        els.recentList.appendChild(musicResultButton({
          title: item.title,
          subtitle: item.artist || item.provider,
          artwork: item.artwork || "",
          item
        }));
      });
      els.recentSection.hidden = recent.length === 0;
    }

    async function pasteAndPlay() {
      try {
        const value = await navigator.clipboard.readText();
        els.linkInput.value = value;
        submitMusicInput(value);
      } catch {
        els.linkHint.textContent = "Paste permission was not available";
      }
    }

    function submitMusicInput(rawValue) {
      const value = rawValue.trim();
      if (!value) {
        els.linkHint.textContent = "Search for a song or paste a link";
        return;
      }
      if (/^(https?:\/\/|spotify:)/i.test(value)) {
        try {
          loadLinkedItem(parseMusicLink(value), true);
        } catch (error) {
          els.linkHint.textContent = error.message;
        }
        return;
      }
      searchMusic(value).catch(error => {
        els.linkHint.textContent = error.message;
      });
    }

    function generateBeatmap(bpm, duration, seed) {
      const interval = 60 / bpm;
      const events = [];
      let beat = 0;
      let time = 0.45;
      while (time < duration) {
        const accent = beat % 4 === 0;
        const syncopation = beat % 8 === 6;
        if (accent || syncopation || beat % 2 === 0) {
          const lane = Math.abs(seed + beat * 7) % 4;
          events.push({
            id: events.length,
            time,
            intensity: accent ? 1 : syncopation ? 0.78 : 0.58,
            lane,
            accent
          });
        }
        beat += 1;
        time += interval;
      }
      return events;
    }

    function clock() {
      if (!state.running) return state.pausedAt;
      return Math.min((performance.now() - state.startedAt) / 1000, state.duration);
    }

    function playableEvents() {
      const cfg = difficulties[state.difficulty];
      return state.events
        .filter((_, index) => index % cfg.stride === 0)
        .map(event => ({ ...event, lane: event.lane % cfg.lanes }));
    }

    function setDifficulty(name) {
      state.difficulty = name;
      document.querySelectorAll("[data-difficulty]").forEach(button => {
        button.classList.toggle("active", button.dataset.difficulty === name);
      });
      renderLanes();
      render();
    }

    function renderLanes() {
      const cfg = difficulties[state.difficulty];
      els.lanes.style.gridTemplateColumns = `repeat(${cfg.lanes}, 1fr)`;
      els.lanes.innerHTML = "";
      for (let i = 0; i < cfg.lanes; i += 1) {
        const button = document.createElement("button");
        button.className = "lane";
        button.type = "button";
        button.setAttribute("aria-label", `Lane ${i + 1}`);
        button.style.setProperty("--lane-color", laneColors[i % laneColors.length]);
        button.addEventListener("click", () => tap(i));
        els.lanes.appendChild(button);
      }
    }

    function start(controlProvider = true) {
      if (state.running) return;
      state.running = true;
      state.startedAt = performance.now() - state.pausedAt * 1000;
      if (state.playbackType === "local") {
        els.audio.play().catch(() => {});
      }
      if (controlProvider) playProvider();
      setPlayIcon(true);
      loop();
    }

    function pause(controlProvider = true) {
      if (!state.running) return;
      state.pausedAt = clock();
      state.running = false;
      cancelAnimationFrame(state.raf);
      els.audio.pause();
      if (controlProvider) pauseProvider();
      setPlayIcon(false);
      render();
    }

    function restart() {
      pause();
      state.pausedAt = 0;
      state.score = 0;
      state.combo = 0;
      state.judged = 0;
      state.accuracyTotal = 0;
      state.hitIds = new Set();
      state.missedIds = new Set();
      els.audio.currentTime = 0;
      restartProvider();
      renderStats();
      render();
    }

    function syncProviderPosition(position, duration, isPaused) {
      if (Number.isFinite(duration) && duration > 1 && Math.abs(duration - state.duration) > 1) {
        state.duration = duration;
        state.events = generateBeatmap(state.bpm, state.duration, state.linkedItem?.seed || 19);
      }

      if (Number.isFinite(position) && position >= 0) {
        state.pausedAt = Math.min(position, state.duration);
        if (state.running) {
          state.startedAt = performance.now() - state.pausedAt * 1000;
        }
      }

      if (isPaused === false && !state.running) start(false);
      if (isPaused === true && state.running) pause(false);
    }

    function playProvider() {
      if (state.playbackType === "youtube" && youtubePlayer?.playVideo) {
        youtubePlayer.playVideo();
      }
      if (state.playbackType === "spotify" && spotifyController?.resume) {
        spotifyController.resume();
      }
      if (state.playbackType === "apple" && integration.appleMusic && state.linkedItem?.appleKind) {
        playAppleMusicProvider();
      }
    }

    async function playAppleMusicProvider() {
      try {
        if (integration.appleQueueId !== state.linkedItem.id) {
          await integration.appleMusic.setQueue({ [state.linkedItem.appleKind]: state.linkedItem.id });
          integration.appleQueueId = state.linkedItem.id;
        }
        await integration.appleMusic.play();
      } catch {
        els.status.textContent = "Use the Apple Music player below";
      }
    }

    function pauseProvider() {
      if (state.playbackType === "youtube" && youtubePlayer?.pauseVideo) {
        youtubePlayer.pauseVideo();
      }
      if (state.playbackType === "spotify" && spotifyController?.pause) {
        spotifyController.pause();
      }
      if (state.playbackType === "apple" && integration.appleMusic?.pause) {
        integration.appleMusic.pause();
      }
    }

    function restartProvider() {
      if (state.playbackType === "youtube" && youtubePlayer?.seekTo) {
        youtubePlayer.seekTo(0, true);
        youtubePlayer.pauseVideo();
      }
      if (state.playbackType === "spotify" && spotifyController?.restart) {
        spotifyController.restart();
        spotifyController.pause();
      }
      if (state.playbackType === "apple" && integration.appleMusic?.seekToTime) {
        integration.appleMusic.seekToTime(0);
      }
    }

    function clearProvider() {
      if (youtubePlayer?.destroy) youtubePlayer.destroy();
      if (spotifyController?.destroy) spotifyController.destroy();
      youtubePlayer = null;
      spotifyController = null;
      integration.appleQueueId = "";
      els.providerMount.innerHTML = "";
      els.providerMount.className = "provider-mount";
      els.providerPlayer.hidden = true;
      document.body.classList.remove("provider-active");
    }

    function showProvider(item, mountClass) {
      els.providerPlayer.hidden = false;
      els.providerMount.className = `provider-mount ${mountClass || ""}`.trim();
      els.providerLabel.textContent = `${item.provider} ${item.kind}`;
      els.providerOpen.href = item.originalUrl;
      document.body.classList.add("provider-active");
    }

    function ensureYouTubeApi() {
      if (window.YT?.Player) return Promise.resolve(window.YT);
      if (youtubeApiPromise) return youtubeApiPromise;
      youtubeApiPromise = new Promise((resolve, reject) => {
        const timeout = window.setTimeout(() => reject(new Error("YouTube player timed out.")), 12000);
        window.onYouTubeIframeAPIReady = () => {
          window.clearTimeout(timeout);
          resolve(window.YT);
        };
        const script = document.createElement("script");
        script.src = "https://www.youtube.com/iframe_api";
        script.async = true;
        script.onerror = () => {
          window.clearTimeout(timeout);
          reject(new Error("YouTube player could not load."));
        };
        document.head.appendChild(script);
      });
      return youtubeApiPromise;
    }

    async function mountYouTube(item) {
      showProvider(item, "youtube");
      els.providerMount.innerHTML = '<div id="youtubePlayerMount"></div>';
      try {
        const YT = await ensureYouTubeApi();
        if (state.linkedItem !== item) return;
        youtubePlayer = new YT.Player("youtubePlayerMount", {
          width: "100%",
          height: "100%",
          videoId: item.videoId || "",
          playerVars: {
            playsinline: 1,
            controls: 1,
            rel: 0,
            origin: window.location.origin,
            ...(item.playlistId ? { listType: "playlist", list: item.playlistId } : {})
          },
          events: {
            onReady: event => {
              const duration = event.target.getDuration();
              const shouldPlay = state.running;
              syncProviderPosition(0, duration, !shouldPlay);
              els.status.textContent = `${item.provider} player ready`;
              if (shouldPlay) event.target.playVideo();
            },
            onStateChange: event => {
              if (event.data === YT.PlayerState.PLAYING) {
                syncProviderPosition(event.target.getCurrentTime(), event.target.getDuration(), false);
              } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                syncProviderPosition(event.target.getCurrentTime(), event.target.getDuration(), true);
              }
            },
            onError: () => {
              els.status.textContent = "YouTube blocked this embed - open it in YouTube";
            }
          }
        });
        els.status.textContent = `${item.provider} player connected`;
      } catch (error) {
        els.status.textContent = error.message;
      }
    }

    function ensureSpotifyApi() {
      if (spotifyApiPromise) return spotifyApiPromise;
      spotifyApiPromise = new Promise((resolve, reject) => {
        const timeout = window.setTimeout(() => reject(new Error("Spotify player timed out.")), 12000);
        window.onSpotifyIframeApiReady = api => {
          window.clearTimeout(timeout);
          resolve(api);
        };
        const script = document.createElement("script");
        script.src = "https://open.spotify.com/embed/iframe-api/v1";
        script.async = true;
        script.onerror = () => {
          window.clearTimeout(timeout);
          reject(new Error("Spotify player could not load."));
        };
        document.head.appendChild(script);
      });
      return spotifyApiPromise;
    }

    async function mountSpotify(item) {
      showProvider(item, "spotify");
      els.providerMount.innerHTML = '<div id="spotifyPlayerMount"></div>';
      try {
        const IFrameAPI = await ensureSpotifyApi();
        if (state.linkedItem !== item) return;
        IFrameAPI.createController(
          document.getElementById("spotifyPlayerMount"),
          { uri: item.spotifyUri, width: "100%", height: 152 },
          controller => {
            if (state.linkedItem !== item) {
              controller.destroy();
              return;
            }
            spotifyController = controller;
            els.status.textContent = "Spotify player ready";
            controller.addListener("ready", () => {
              els.status.textContent = "Spotify player ready";
              if (state.running) controller.resume();
            });
            controller.addListener("playback_update", event => {
              const update = event.data;
              syncProviderPosition(update.position / 1000, update.duration / 1000, update.isPaused);
            });
          }
        );
      } catch (error) {
        els.status.textContent = error.message;
      }
    }

    function mountAppleMusic(item) {
      showProvider(item, "apple");
      const iframe = document.createElement("iframe");
      iframe.src = item.embedUrl;
      iframe.title = "Apple Music player";
      iframe.allow = "autoplay *; encrypted-media *; fullscreen *";
      iframe.loading = "eager";
      els.providerMount.replaceChildren(iframe);
      els.status.textContent = "Apple Music player ready";
    }

    function mountLinkedProvider(item) {
      if (item.flavor === "spotify") return mountSpotify(item);
      if (item.flavor === "apple") return mountAppleMusic(item);
      return mountYouTube(item);
    }

    function tap(lane) {
      const t = clock();
      const cfg = difficulties[state.difficulty];
      const candidates = playableEvents()
        .filter(event => !state.hitIds.has(event.id))
        .filter(event => !state.missedIds.has(event.id))
        .filter(event => event.lane === lane)
        .filter(event => Math.abs(event.time - t) <= cfg.good + 0.09);

      if (!candidates.length) {
        register("Miss", 0, null);
        return;
      }

      candidates.sort((a, b) => Math.abs(a.time - t) - Math.abs(b.time - t));
      const event = candidates[0];
      const offset = t - event.time;
      const distance = Math.abs(offset);
      let judgement = "Miss";
      let weight = 0;
      let points = 0;
      if (distance <= cfg.perfect) {
        judgement = "Perfect";
        weight = 1;
        points = 1000;
      } else if (distance <= cfg.great) {
        judgement = "Great";
        weight = 0.78;
        points = 700;
      } else if (distance <= cfg.good) {
        judgement = "Good";
        weight = 0.48;
        points = 400;
      }

      if (judgement === "Miss") state.missedIds.add(event.id);
      else state.hitIds.add(event.id);

      register(judgement, weight, points);
    }

    function register(judgement, weight, points) {
      state.judged += 1;
      state.accuracyTotal += weight;
      if (judgement === "Miss") {
        state.combo = 0;
      } else {
        state.combo += 1;
        state.score += points + state.combo * 8;
      }
      flash(judgement);
      renderStats();
    }

    function flash(judgement) {
      els.feedback.textContent = judgement;
      els.feedback.style.color = judgement === "Miss"
        ? "var(--coral)"
        : judgement === "Good"
          ? "var(--teal)"
          : judgement === "Great"
            ? "var(--lime)"
            : "var(--yellow)";
      els.feedback.classList.remove("show");
      void els.feedback.offsetWidth;
      els.feedback.classList.add("show");
      window.setTimeout(() => els.feedback.classList.remove("show"), 260);
    }

    function markExpired(t) {
      const cfg = difficulties[state.difficulty];
      playableEvents()
        .filter(event => event.time < t - cfg.good)
        .filter(event => !state.hitIds.has(event.id) && !state.missedIds.has(event.id))
        .slice(0, 4)
        .forEach(event => {
          state.missedIds.add(event.id);
          register("Miss", 0, 0);
        });
    }

    function renderStats() {
      els.score.textContent = String(state.score);
      els.combo.textContent = String(state.combo);
      const accuracy = state.judged ? Math.round((state.accuracyTotal / state.judged) * 100) : 100;
      els.accuracy.textContent = `${accuracy}%`;
    }

    function render() {
      const t = clock();
      const cfg = difficulties[state.difficulty];
      const lead = 2.4;
      const rect = els.arena.getBoundingClientRect();
      const hitY = rect.height - 41;
      const laneWidth = rect.width / cfg.lanes;
      const upcoming = playableEvents()
        .filter(event => event.time >= t && event.time <= t + lead)
        .filter(event => !state.hitIds.has(event.id) && !state.missedIds.has(event.id));

      els.trackTitle.textContent = state.trackTitle;
      els.trackMeta.textContent = `${state.artist} - ${state.source}`;
      els.progress.style.width = `${Math.min(100, (t / state.duration) * 100)}%`;
      els.notes.innerHTML = "";

      upcoming.forEach(event => {
        const remaining = Math.max(event.time - t, 0);
        const travel = 1 - Math.min(remaining / lead, 1);
        const note = document.createElement("div");
        note.className = "note";
        note.style.setProperty("--size", `${18 + event.intensity * 12}px`);
        note.style.setProperty("--color", laneColors[event.lane % laneColors.length]);
        note.style.setProperty("--x", `${laneWidth * event.lane + laneWidth / 2}px`);
        note.style.setProperty("--y", `${18 + (hitY - 18) * travel}px`);
        els.notes.appendChild(note);
      });
    }

    function loop() {
      const t = clock();
      markExpired(t);
      render();
      if (t >= state.duration) {
        pause();
        return;
      }
      state.raf = requestAnimationFrame(loop);
    }

    function setPlayIcon(running) {
      els.playButton.innerHTML = `<span class="${running ? "pause-icon" : "play-icon"}" aria-hidden="true"></span>`;
      els.playButton.setAttribute("aria-label", running ? "Pause" : "Play");
    }

    function loadDemo() {
      restart();
      clearProvider();
      state.trackTitle = "Neon Pocket";
      state.artist = "FingerTapper";
      state.source = "Demo";
      state.bpm = 124;
      state.duration = 96;
      state.playbackType = "demo";
      state.linkedItem = null;
      state.events = generateBeatmap(state.bpm, state.duration, 19);
      els.audio.removeAttribute("src");
      els.status.textContent = "124 BPM - generated preview";
      closeDrawer();
      render();
    }

    function loadLocalFile(file) {
      if (!file) return;
      restart();
      clearProvider();
      const url = URL.createObjectURL(file);
      els.audio.src = url;
      els.audio.onloadedmetadata = () => {
        state.duration = Number.isFinite(els.audio.duration) ? els.audio.duration : 120;
        const seed = Array.from(file.name).reduce((sum, char) => sum + char.charCodeAt(0), 0);
        state.bpm = [92, 100, 108, 116, 124, 132, 140][seed % 7];
        state.trackTitle = file.name.replace(/\.[^.]+$/, "");
        state.artist = "Local File";
        state.source = "Browser";
        state.playbackType = "local";
        state.linkedItem = null;
        state.events = generateBeatmap(state.bpm, state.duration, seed);
        els.status.textContent = `${state.bpm} BPM - local preview`;
        closeDrawer();
        render();
        start();
      };
      els.audio.load();
    }

    function parseMusicLink(rawValue) {
      const value = rawValue.trim();
      if (!value) {
        throw new Error("Search for a song or paste a music link.");
      }

      const spotifyUri = value.match(/^spotify:(track|playlist|album):([A-Za-z0-9]+)$/i);
      if (spotifyUri) {
        const [, kind, id] = spotifyUri;
        return linkedItem("Spotify", kind, id, "spotify", {
          originalUrl: `https://open.spotify.com/${kind}/${id}`,
          spotifyUri: `spotify:${kind}:${id}`
        });
      }

      let url;
      try {
        url = new URL(value);
      } catch {
        throw new Error("That link does not look like a valid URL.");
      }

      const host = url.hostname.replace(/^www\./, "").toLowerCase();
      const pathParts = url.pathname.split("/").filter(Boolean);

      if (host === "open.spotify.com") {
        const spotifyParts = pathParts[0]?.startsWith("intl-") ? pathParts.slice(1) : pathParts;
        const [kind, id] = spotifyParts;
        if (["track", "playlist", "album"].includes(kind) && id) {
          return linkedItem("Spotify", kind, id, "spotify", {
            originalUrl: value,
            spotifyUri: `spotify:${kind}:${id}`
          });
        }
      }

      if (host === "youtu.be" && pathParts[0]) {
        return linkedItem("YouTube", "video", pathParts[0], "youtube", {
          originalUrl: value,
          videoId: pathParts[0]
        });
      }

      if (host === "youtube.com" || host === "m.youtube.com" || host === "music.youtube.com") {
        const provider = host === "music.youtube.com" ? "YouTube Music" : "YouTube";
        const flavor = host === "music.youtube.com" ? "youtube-music" : "youtube";
        const playlistId = url.searchParams.get("list");
        const videoId = url.searchParams.get("v") || (pathParts[0] === "shorts" ? pathParts[1] : "");
        const isRadioMix = playlistId && (playlistId.startsWith("RD") || url.searchParams.get("start_radio") === "1");

        if (playlistId && pathParts[0] === "playlist") {
          return linkedItem(provider, "playlist", playlistId, flavor, {
            originalUrl: value,
            playlistId
          });
        }

        if (isRadioMix) {
          return linkedItem(provider, "mix", playlistId, flavor, {
            originalUrl: value,
            playlistId,
            videoId
          });
        }

        if (videoId) {
          return linkedItem(provider, "video", videoId, flavor, {
            originalUrl: value,
            videoId,
            playlistId
          });
        }

        if (playlistId) {
          return linkedItem(provider, "playlist", playlistId, flavor, {
            originalUrl: value,
            playlistId
          });
        }
      }

      if (host === "music.apple.com" || host === "embed.music.apple.com") {
        const kind = pathParts.find(part => ["album", "playlist", "song"].includes(part)) || "music";
        const id = url.searchParams.get("i") || pathParts[pathParts.length - 1];
        if (id) {
          const embedUrl = new URL(value);
          embedUrl.hostname = "embed.music.apple.com";
          return linkedItem("Apple Music", kind, id, "apple", {
            originalUrl: value,
            embedUrl: embedUrl.toString(),
            appleKind: kind
          });
        }
      }

      throw new Error("Supported links: Spotify, YouTube, YouTube Music, and Apple Music.");
    }

    function linkedItem(provider, kind, id, flavor, playback = {}) {
      const normalizedKind = kind === "track" ? "song" : kind;
      const titleKind = normalizedKind === "mix" ? "mix" : normalizedKind;
      const title = `${provider} ${titleKind}`;
      const seed = Array.from(`${provider}:${kind}:${id}`).reduce((sum, char) => sum + char.charCodeAt(0), 0);
      const bpmChoices = [92, 100, 108, 116, 124, 132, 140];
      return {
        provider,
        kind: normalizedKind,
        id,
        flavor,
        title,
        bpm: bpmChoices[seed % bpmChoices.length],
        duration: ["playlist", "mix"].includes(normalizedKind) ? 128 : 92,
        seed,
        ...playback
      };
    }

    function loadLinkedItem(item, autoStart = true) {
      restart();
      clearProvider();
      state.trackTitle = item.title;
      state.artist = item.artist || (["playlist", "mix"].includes(item.kind) ? "Imported playlist" : "Imported song");
      state.source = item.provider;
      state.bpm = item.bpm;
      state.duration = item.duration;
      state.playbackType = item.flavor === "spotify" ? "spotify" : item.flavor === "apple" ? "apple" : "youtube";
      state.linkedItem = item;
      state.events = generateBeatmap(item.bpm, item.duration, item.seed);
      els.audio.removeAttribute("src");
      els.status.textContent = `Loading ${item.provider} player`;
      els.linkHint.textContent = `${item.provider} player added`;
      mountLinkedProvider(item);
      closeDrawer();
      render();
      saveRecent(item);
      if (autoStart) window.setTimeout(start, 0);
    }

    function openDrawer() {
      els.drawer.classList.add("open");
      renderProviderConnections();
      renderRecents();
    }

    function closeDrawer() {
      els.drawer.classList.remove("open");
    }

    document.querySelectorAll("[data-difficulty]").forEach(button => {
      button.addEventListener("click", () => setDifficulty(button.dataset.difficulty));
    });
    document.getElementById("sourcesButton").addEventListener("click", openDrawer);
    document.getElementById("addButton").addEventListener("click", openDrawer);
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    document.getElementById("demoSource").addEventListener("click", loadDemo);
    document.getElementById("localSource").addEventListener("click", () => els.fileInput.click());
    document.querySelectorAll("[data-select-provider]").forEach(button => {
      button.addEventListener("click", () => selectProvider(button.dataset.selectProvider));
    });
    document.querySelectorAll("[data-connect-provider]").forEach(button => {
      button.addEventListener("click", () => connectProvider(button.dataset.connectProvider));
    });
    els.pasteButton.addEventListener("click", pasteAndPlay);
    els.linkForm.addEventListener("submit", event => {
      event.preventDefault();
      submitMusicInput(els.linkInput.value);
    });
    els.fileInput.addEventListener("change", event => loadLocalFile(event.target.files[0]));
    els.playButton.addEventListener("click", () => state.running ? pause() : start());
    els.restartButton.addEventListener("click", restart);
    window.addEventListener("resize", render);
    window.addEventListener("keydown", event => {
      const cfg = difficulties[state.difficulty];
      const index = Number(event.key) - 1;
      if (index >= 0 && index < cfg.lanes) tap(index);
      if (event.code === "Space") {
        event.preventDefault();
        state.running ? pause() : start();
      }
    });

    state.events = generateBeatmap(state.bpm, state.duration, 19);
    renderLanes();
    renderStats();
    renderProviderConnections();
    renderRecents();
    render();
    loadIntegrationConfig();
  </script>
</body>
</html>
