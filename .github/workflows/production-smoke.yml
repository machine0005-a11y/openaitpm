name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 15 * * *"

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || vars.PRODUCTION_SMOKE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run smoke:production
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://openaitpm.com' }}
